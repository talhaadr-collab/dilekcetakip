<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Dilekçe ve Bilgi Edinme Takip</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16302B">
<link rel="icon" type="image/png" sizes="32x32" href="https://raw.githubusercontent.com/talhaadr-collab/muracaat-takip/main/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="https://raw.githubusercontent.com/talhaadr-collab/muracaat-takip/main/favicon-16.png">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/talhaadr-collab/muracaat-takip/main/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dilekçe Takip">
<meta name="mobile-web-app-capable" content="yes">

<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --bg:#EEF1EC;
  --surface:#FFFFFF;
  --ink:#16302B;
  --ink-soft:#54655F;
  --line:#DDE3DD;
  --teal:#2E7D6B;
  --teal-soft:#E3F0EB;
  --amber:#BE7A3B;
  --amber-soft:#F5E9DC;
  --indigo:#4C5C9C;
  --indigo-soft:#E6E8F3;
  --rust:#B5502F;
  --rust-soft:#F5E1D9;
  --green:#3E8E5A;
  --green-soft:#E1F0E6;
  --red:#C1443A;
  --red-soft:#F9E0DD;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;}
.mono{font-family:'IBM Plex Mono',monospace;}
h1,h2,h3,.disp{font-family:'Fraunces',serif;}

header{
  background:var(--ink);
  color:#fff;
  padding:22px 32px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  flex-wrap:wrap;
}
header .brand{display:flex;align-items:center;gap:14px;}
header .brand-logo{height:44px;width:auto;flex:none;border-radius:10px;}
header h1{margin:0;font-size:22px;font-weight:600;letter-spacing:.2px;}
header p{margin:2px 0 0;font-size:12.5px;color:#B9C9C2;}
.header-actions{display:flex;gap:10px;align-items:center;}
.newbtn{
  background:var(--teal);color:#fff;border:none;padding:11px 20px;border-radius:8px;
  font-family:'Inter';font-weight:600;font-size:14px;cursor:pointer;
  display:flex;align-items:center;gap:8px;transition:transform .15s ease, background .15s ease;
}
.newbtn:hover{background:#256456;transform:translateY(-1px);}

/* ---------- REPORT / LIST VIEW ---------- */
.report-wrap{padding:26px 32px 60px;}
.report-filters{
  display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;
  background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:14px;
}
.report-filters input[type=text],.report-filters input[type=date],.report-filters select{
  padding:9px 12px;border:1px solid var(--line);border-radius:7px;font-family:'Inter';font-size:13.5px;background:#fff;color:var(--ink);
}
.report-filters input[type=text]{flex:1;min-width:200px;}
.urgent-toggle{
  display:flex;align-items:center;gap:7px;padding:9px 14px;border:1.5px solid var(--red);border-radius:7px;
  cursor:pointer;font-size:13px;font-weight:600;color:var(--red);background:#fff;user-select:none;
}
.urgent-toggle.on{background:var(--red);color:#fff;}
.rep-count{font-size:12.5px;color:var(--ink-soft);margin-bottom:12px;}
.rep-tbl{width:100%;border-collapse:collapse;background:var(--surface);border-radius:10px;overflow:hidden;border:1px solid var(--line);}
.rep-tbl th{
  text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:var(--ink-soft);
  padding:12px 14px;background:#FAFBF9;border-bottom:1px solid var(--line);white-space:nowrap;
}
.rep-tbl td{padding:12px 14px;font-size:13.5px;border-bottom:1px solid var(--line);vertical-align:top;}
.rep-tbl tbody tr{cursor:pointer;}
.rep-tbl tbody tr:hover{filter:brightness(0.98);}
.rep-tbl tbody tr:last-child td{border-bottom:none;}
.rep-tbl tbody tr.row-done{background:var(--green-soft);}
.rep-tbl tbody tr.row-progress{background:var(--amber-soft);}
.rep-tbl tbody tr.row-kayit{background:var(--surface);}
.rep-tbl tbody tr.row-urgent{background:var(--red-soft);}
.konu-cell{max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.urgent-tag{
  display:inline-block;background:var(--red);color:#fff;font-size:10.5px;font-weight:700;
  padding:2px 8px;border-radius:20px;margin-left:6px;letter-spacing:.3px;
}
.badge{
  font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;
}
.empty-col{border:1.5px dashed var(--line);border-radius:10px;padding:24px 10px;text-align:center;color:#9AA79F;font-size:13px;}

@media(max-width:640px){
  .report-wrap{padding:18px;}
  .rep-tbl thead{display:none;}
  .rep-tbl, .rep-tbl tbody, .rep-tbl tr{display:block;width:100%;}
  .rep-tbl{border-collapse:separate;border:none;background:transparent;}
  .rep-tbl tbody tr{
    display:flex;flex-direction:column;gap:6px;
    background:var(--surface);border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;margin-bottom:10px;
  }
  .rep-tbl tbody tr.row-done{background:var(--green-soft);}
  .rep-tbl tbody tr.row-progress{background:var(--amber-soft);}
  .rep-tbl tbody tr.row-urgent{background:var(--red-soft);}
  .rep-tbl td{display:flex;flex-direction:column;gap:2px;padding:4px 0;border-bottom:none;font-size:13.5px;}
  .rep-tbl td::before{
    content:attr(data-label);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--ink-soft);
  }
  .konu-cell{max-width:none;white-space:normal;}
}

/* ---------- MODAL ---------- */
.overlay{
  position:fixed;inset:0;background:rgba(22,48,43,.45);
  display:none;align-items:center;justify-content:center;z-index:50;padding:24px;backdrop-filter:blur(2px);
}
.overlay.open{display:flex;}
.modal{
  background:var(--surface);width:100%;max-width:920px;max-height:88vh;border-radius:14px;overflow:hidden;
  display:grid;grid-template-columns:230px 1fr;box-shadow:0 24px 60px rgba(0,0,0,.28);
}
@media(max-width:760px){.modal{grid-template-columns:1fr;max-height:92vh;}}

.rail{background:var(--ink);color:#fff;padding:24px 20px;display:flex;flex-direction:column;overflow-y:auto;}
.rail-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;}
.rail .no{font-family:'IBM Plex Mono';font-size:12px;color:#9FCABD;}
.rail .close{background:none;border:none;color:#B9C9C2;font-size:20px;cursor:pointer;line-height:1;padding:2px;}
.rail .close:hover{color:#fff;}
.rail .close[title="Kaydı Sil"]:hover{color:#E5806A;}
.rail .urgent-banner{
  background:rgba(193,68,58,.25);border:1px solid rgba(193,68,58,.6);color:#FFD6D1;
  padding:8px 10px;border-radius:8px;font-size:12px;font-weight:600;margin-bottom:16px;
}
.pipe{position:relative;padding-left:26px;}
.pipe::before{content:'';position:absolute;left:9px;top:6px;bottom:6px;width:2px;background:rgba(255,255,255,.18);}
.pipe-fill{position:absolute;left:9px;top:6px;width:2px;background:var(--teal);transition:height .4s ease;}
.stage-item{position:relative;padding:0 0 26px;cursor:pointer;}
.stage-item:last-child{padding-bottom:0;}
.stage-dot{
  position:absolute;left:-26px;top:0;width:20px;height:20px;border-radius:50%;
  background:#2A4841;border:2px solid rgba(255,255,255,.25);
  display:flex;align-items:center;justify-content:center;
  font-family:'IBM Plex Mono';font-size:10px;font-weight:600;color:#B9C9C2;transition:all .2s ease;
}
.stage-item.done .stage-dot{background:var(--teal);border-color:var(--teal);color:#fff;}
.stage-item.active .stage-dot{background:#fff;border-color:#fff;color:var(--ink);}
.stage-item .lbl{font-size:13.5px;font-weight:600;color:#B9C9C2;}
.stage-item.done .lbl,.stage-item.active .lbl{color:#fff;}
.stage-item .sub{font-size:11.5px;color:#8AA69C;margin-top:2px;line-height:1.4;}

.panel{overflow-y:auto;padding:26px 30px 30px;}
.panel h2{margin:0 0 2px;font-size:20px;}
.panel .meta{font-size:12.5px;color:var(--ink-soft);margin-bottom:22px;}
.section{border:1px solid var(--line);border-radius:10px;margin-bottom:14px;overflow:hidden;}
.sec-head{padding:13px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;background:#FAFBF9;}
.sec-head .idx{
  width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'IBM Plex Mono';font-size:11px;font-weight:600;color:#fff;flex:none;
}
.sec-head .t{font-weight:600;font-size:14px;flex:1;}
.sec-head .stat{font-size:11.5px;color:var(--ink-soft);}
.sec-head .chev{transition:transform .2s ease;color:var(--ink-soft);}
.sec-body{padding:16px 18px 18px;border-top:1px solid var(--line);display:none;}
.section.open .sec-body{display:block;}
.section.open .chev{transform:rotate(180deg);}

.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px;}
.field input[type=text],.field select,.field textarea{
  width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:7px;
  font-family:'Inter';font-size:14px;background:#fff;color:var(--ink);
}
.field textarea{resize:vertical;min-height:90px;line-height:1.5;}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--teal);outline-offset:0;border-color:var(--teal);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
@media(max-width:520px){.row2,.row3{grid-template-columns:1fr;}}

.choice-grp{display:flex;gap:8px;flex-wrap:wrap;}
.choice{
  border:1.5px solid var(--line);border-radius:7px;padding:9px 14px;font-size:13.5px;font-weight:500;
  cursor:pointer;background:#fff;user-select:none;transition:all .12s ease;
}
.choice:hover{border-color:var(--teal);}
.choice.sel{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:600;}
.choice.sel.neg{background:var(--rust);border-color:var(--rust);}

.readrow{display:flex;justify-content:space-between;gap:10px;font-size:13.5px;padding:6px 0;border-bottom:1px dashed var(--line);}
.readrow:last-child{border-bottom:none;}
.readrow .k{color:var(--ink-soft);}
.readrow .v{font-weight:600;text-align:right;}

.primary-btn{
  background:var(--teal);color:#fff;border:none;padding:11px 18px;border-radius:7px;
  font-weight:600;font-size:13.5px;cursor:pointer;margin-top:4px;
}
.primary-btn:disabled{background:#B7C4BF;cursor:not-allowed;}
.primary-btn:not(:disabled):hover{background:#256456;}
.help{font-size:12px;color:#9AA79F;margin-top:6px;}
.done-banner{
  display:flex;align-items:center;gap:8px;font-size:13px;color:var(--green);font-weight:600;
  background:var(--green-soft);padding:9px 12px;border-radius:7px;margin-top:6px;
}
.locked-note{font-size:12.5px;color:#9AA79F;font-style:italic;}
.completed-strip{margin-top:18px;padding:16px;border-radius:10px;background:var(--green-soft);border:1px solid #BFE0CB;text-align:center;}
.completed-strip .disp{font-size:16px;color:var(--green);margin:0 0 2px;}
.completed-strip p{margin:0;font-size:12.5px;color:#3E6E52;}
</style>
</head>
<body>

<header>
  <div class="brand">
    <img src="https://raw.githubusercontent.com/talhaadr-collab/muracaat-takip/main/header-logo.png" alt="KOSKİ" class="brand-logo">
    <div>
      <h1>10. Bölge Şube Müdürlüğü</h1>
      <p>Dilekçe &amp; Bilgi Edinme Takip</p>
    </div>
  </div>
  <div class="header-actions">
    <button class="newbtn" onclick="createKayit()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Yeni Kayıt
    </button>
  </div>
</header>

<div class="report-wrap" id="reportView"></div>

<div class="overlay" id="overlay" onmousedown="handleOverlayClick(event)">
  <div class="modal" id="modal" onmousedown="event.stopPropagation()"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.15.0/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.15.0/firebase-firestore-compat.min.js"></script>

<script>
/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyCcT_S_n4Vh0HSG9yxoBEw-6EpkGSPMj3A",
  authDomain: "muracaat-takip.firebaseapp.com",
  projectId: "muracaat-takip",
  storageBucket: "muracaat-takip.firebasestorage.app",
  messagingSenderId: "892225377254",
  appId: "1:892225377254:web:256a460ae02be895febc27"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
// separate collection from the su/kanal app — same project, independent data
const kayitlarRef = db.collection('dilekceler');

/* ================= CONFIG ================= */
const TURLER = ["Dilekçe","Bilgi Edinme"];
const GUN_MS = 24*60*60*1000;

function uid(){ return 'D' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2,5).toUpperCase(); }
function esc(s){ return (s||'').toString().replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmtDate(ts){ return ts ? new Date(ts).toLocaleString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : ''; }
function fmtDateShort(ts){ return ts ? new Date(ts).toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric'}) : ''; }

function blank(){
  return {
    id: uid(), createdAt: Date.now(), updatedAt: Date.now(),
    adSoyad:"", tcKimlik:"", aboneNo:"", konu:"", turu:"",
    kayitTamam:false, kayitTarih:null,
    cevapNiteligi:null,        // 'olumlu' | 'olumsuz'
    bildirimSekli:null,        // 'telefon' | 'yuzyuze'  (yalnızca Dilekçe + olumlu)
    bildirimTarih:null,
    yaziliCevapVerildi:false,
    yaziliCevapTarih:null,
    tamamlandi:false, tamamlandiTarih:null
  };
}

// Bilgi Edinme her zaman, Dilekçe ise yalnızca olumsuz cevapta yazılı cevap zorunlu.
function gerekYaziliCevap(b){
  return b.turu === 'Bilgi Edinme' || b.cevapNiteligi === 'olumsuz';
}
function currentStage(b){
  if(!b.kayitTamam) return 1;   // Kayıt
  if(!b.tamamlandi) return 2;   // Cevap Süreci
  return 3;                     // Tamamlandı
}
function gunGecti(b){
  return Math.floor((Date.now() - b.createdAt) / GUN_MS);
}
// Kayıttan sonra hiçbir işlem adımına geçilmediyse (cevap niteliği hiç seçilmediyse)
// ve süre eşiğini geçtiyse acil/kırmızı işaretlenir.
function isUrgent(b){
  if(b.tamamlandi) return false;
  if(b.cevapNiteligi) return false;
  const esik = b.turu === 'Bilgi Edinme' ? 10 : 25;
  return gunGecti(b) >= esik;
}
function stageLabel(stage){
  return {1:'Kayıt',2:'Cevap Süreci',3:'Tamamlandı'}[stage];
}
function stageColor(stage){
  return {1:'teal',2:'amber',3:'green'}[stage];
}

let DATA = [];
let openId = null;
let openSections = {1:false,2:false};
let modalOpenedAt = 0;
let saveTimer = null;
let pendingEditId = null;
let reportFilters = {search:'', turu:'all', durum:'all', onlyUrgent:false, from:'', to:''};

function handleOverlayClick(event){
  if(event.target !== event.currentTarget) return;
  if(Date.now() - modalOpenedAt < 350) return;
  closeModal();
}

/* ================= STORAGE (Firestore) ================= */
async function pushRecord(b){
  try{ await kayitlarRef.doc(b.id).set(b); }
  catch(e){ console.error('Firestore yazma hatası', e); }
}
function isBlank(b){
  return !b.adSoyad && !b.tcKimlik && !b.aboneNo && !b.konu && !b.turu;
}
async function deleteKayit(id){
  const b = DATA.find(x=>x.id===id);
  const label = b && b.adSoyad ? `"${b.adSoyad}" kaydını` : 'bu kaydı';
  if(!confirm(`${label} kalıcı olarak silmek istediğinize emin misiniz? Bu işlem geri alınamaz.`)) return;
  const idx = DATA.findIndex(x=>x.id===id);
  if(idx>=0) DATA.splice(idx,1);
  if(openId === id){ openId = null; document.getElementById('overlay').classList.remove('open'); }
  render();
  try{ await kayitlarRef.doc(id).delete(); }
  catch(e){ console.error('Kayıt silinemedi', e); }
}

/* ================= TEXT FIELDS (no re-render while typing) ================= */
function updateTextField(id, field, value){
  const b = DATA.find(x=>x.id===id);
  if(!b) return;
  b[field] = value;
  b.updatedAt = Date.now();
  pendingEditId = id;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    const rec = DATA.find(x=>x.id===id);
    if(rec) await pushRecord(rec);
    pendingEditId = null;
    render();
  }, 700);
  refreshButtons(id);
}
function refreshButtons(id){
  const b = DATA.find(x=>x.id===id);
  if(!b) return;
  const btn1 = document.getElementById('btn-stage1-'+id);
  if(btn1) btn1.disabled = !(b.adSoyad && b.tcKimlik && b.konu && b.turu);
}

/* ================= ACTIONS ================= */
async function updateField(id, field, value){
  const b = DATA.find(x=>x.id===id);
  if(!b) return;
  b[field] = value;
  b.updatedAt = Date.now();
  if(field === 'cevapNiteligi'){ b.bildirimSekli=null; b.yaziliCevapVerildi=false; b.yaziliCevapTarih=null; }
  renderModal();
  render();
  await pushRecord(b);
}
async function completeStage1(id){
  const b = DATA.find(x=>x.id===id);
  b.kayitTamam = true; b.kayitTarih = Date.now(); b.updatedAt = Date.now();
  openSections = {1:false,2:true};
  renderModal(); render();
  await pushRecord(b);
}
async function toggleYaziliCevap(id, value){
  const b = DATA.find(x=>x.id===id);
  b.yaziliCevapVerildi = value;
  b.yaziliCevapTarih = value ? Date.now() : null;
  b.updatedAt = Date.now();
  renderModal(); render();
  await pushRecord(b);
}
async function finishSurec(id){
  const b = DATA.find(x=>x.id===id);
  if(gerekYaziliCevap(b)){
    if(!b.yaziliCevapVerildi) return;
  }else{
    if(!b.bildirimSekli) return;
    b.bildirimTarih = Date.now();
  }
  b.tamamlandi = true; b.tamamlandiTarih = Date.now(); b.updatedAt = Date.now();
  renderModal(); render();
  await pushRecord(b);
}

/* ================= CREATE ================= */
async function createKayit(){
  const b = blank();
  DATA.push(b);
  render();
  openModal(b.id);
  await pushRecord(b);
}

/* ================= MODAL ================= */
function openModal(id){
  openId = id;
  modalOpenedAt = Date.now();
  const b = DATA.find(x=>x.id===id);
  const stage = currentStage(b);
  openSections = {1:false,2:false};
  openSections[Math.min(stage,2)] = true;
  document.getElementById('overlay').classList.add('open');
  renderModal();
}
async function closeModal(){
  const id = openId;
  const b = DATA.find(x=>x.id===id);
  openId = null;
  document.getElementById('overlay').classList.remove('open');
  if(b && !b.kayitTamam && isBlank(b)){
    const idx = DATA.findIndex(x=>x.id===id);
    if(idx>=0) DATA.splice(idx,1);
    render();
    try{ await kayitlarRef.doc(id).delete(); }
    catch(e){ console.error('Boş kayıt silinemedi', e); }
  }
}
function toggleSection(idx){
  openSections[idx] = !openSections[idx];
  renderModal();
}

function renderModal(){
  const b = DATA.find(x=>x.id===openId);
  if(!b) return;
  const stage = currentStage(b);
  const urgent = isUrgent(b);
  const modal = document.getElementById('modal');

  let railHtml = `
    <div class="rail-top">
      <div><div class="no">${b.tcKimlik ? 'TC ***'+b.tcKimlik.slice(-4) : 'TASLAK'}</div></div>
      <div style="display:flex;gap:6px;">
        <button class="close" title="Kaydı Sil" onclick="deleteKayit('${b.id}')">🗑</button>
        <button class="close" onclick="closeModal()">✕</button>
      </div>
    </div>
    ${urgent ? `<div class="urgent-banner">⚠ Süre eşiği aşıldı — ${gunGecti(b)} gündür işlem yapılmadı</div>` : ''}
    <div class="pipe">
      <div class="pipe-fill" style="height:${stage>1?62:0}px"></div>
      <div class="stage-item ${stage>1?'done':''} ${stage===1?'active':''}" onclick="toggleSection(1)">
        <div class="stage-dot">${stage>1?'✓':'1'}</div>
        <div class="lbl">Kayıt</div>
        <div class="sub">${b.turu || ''}</div>
      </div>
      <div class="stage-item ${stage>2?'done':''} ${stage===2?'active':''}" onclick="toggleSection(2)">
        <div class="stage-dot">${stage>2?'✓':'2'}</div>
        <div class="lbl">Cevap Süreci</div>
        <div class="sub">${b.cevapNiteligi ? (b.cevapNiteligi==='olumlu'?'Olumlu':'Olumsuz') : ''}</div>
      </div>
    </div>
    ${b.tamamlandi ? `<div style="margin-top:auto;padding-top:20px;font-size:12px;color:#8AA69C;">Tamamlandı<br>${fmtDate(b.tamamlandiTarih)}</div>` : ''}
  `;

  const panelHtml = `
    <h2 class="disp">${esc(b.adSoyad) || 'Yeni Kayıt'}</h2>
    <div class="meta">Kayıt: ${fmtDate(b.createdAt)} · ${gunGecti(b)} gün geçti${urgent ? ' <span class="urgent-tag">ACİL</span>' : ''}</div>
    ${section1(b)}
    ${section2(b)}
    ${b.tamamlandi ? `<div class="completed-strip"><p class="disp">Süreç tamamlandı</p><p>${fmtDate(b.tamamlandiTarih)}</p></div>` : ''}
  `;

  modal.innerHTML = `<div class="rail">${railHtml}</div><div class="panel">${panelHtml}</div>`;
}

/* ---- Section 1: Kayıt ---- */
function section1(b){
  const complete = b.kayitTamam;
  const open = openSections[1];
  return `
  <div class="section ${open?'open':''}">
    <div class="sec-head" onclick="toggleSection(1)">
      <div class="idx" style="background:var(--teal)">${complete?'✓':'1'}</div>
      <div class="t">Kayıt</div>
      <div class="stat">${complete ? fmtDate(b.kayitTarih) : 'Devam ediyor'}</div>
      <div class="chev">▾</div>
    </div>
    <div class="sec-body">
      ${complete ? `
        <div class="readrow"><span class="k">Ad Soyad</span><span class="v">${esc(b.adSoyad)}</span></div>
        <div class="readrow"><span class="k">TC Kimlik No</span><span class="v mono">${esc(b.tcKimlik)}</span></div>
        ${b.aboneNo ? `<div class="readrow"><span class="k">Abone No</span><span class="v mono">${esc(b.aboneNo)}</span></div>` : ''}
        <div class="readrow"><span class="k">Tür</span><span class="v">${esc(b.turu)}</span></div>
        <div class="readrow"><span class="k">Konu / İçerik</span><span class="v" style="max-width:60%;text-align:right;">${esc(b.konu)}</span></div>
        <details style="margin-top:8px;"><summary style="cursor:pointer;font-size:12.5px;color:var(--teal);font-weight:600;">Bilgileri düzenle</summary>
          <div style="margin-top:12px;">${section1Fields(b)}</div>
        </details>
      ` : section1Fields(b)}
    </div>
  </div>`;
}
function section1Fields(b){
  return `
    <div class="row2">
      <div class="field"><label>Ad Soyad</label>
        <input type="text" value="${esc(b.adSoyad)}" oninput="updateTextField('${b.id}','adSoyad',this.value)" placeholder="Başvuru sahibi"></div>
      <div class="field"><label>TC Kimlik No</label>
        <input type="text" maxlength="11" inputmode="numeric" value="${esc(b.tcKimlik)}" oninput="updateTextField('${b.id}','tcKimlik',this.value)" placeholder="11 haneli TC no"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Abone No <span style="text-transform:none;font-weight:400;">(varsa)</span></label>
        <input type="text" value="${esc(b.aboneNo)}" oninput="updateTextField('${b.id}','aboneNo',this.value)" placeholder="Abone numarası"></div>
      <div class="field"><label>Başvuru Türü</label>
        <div class="choice-grp">
          ${TURLER.map(t=>`<div class="choice ${b.turu===t?'sel':''}" onclick="updateField('${b.id}','turu','${t}')">${t}</div>`).join('')}
        </div>
      </div>
    </div>
    <div class="field"><label>Konu / İçerik</label>
      <textarea oninput="updateTextField('${b.id}','konu',this.value)" placeholder="Dilekçe içeriği veya bilgi edinme talebinin konusu">${esc(b.konu)}</textarea>
    </div>
    <button class="primary-btn" id="btn-stage1-${b.id}" ${(!b.adSoyad||!b.tcKimlik||!b.konu||!b.turu)?'disabled':''} onclick="completeStage1('${b.id}')">Onayla ve Cevap Sürecine Gönder</button>
    <p class="help">Ad soyad, TC kimlik no, konu ve tür girildiğinde kayıt cevap sürecine düşer.</p>
  `;
}

/* ---- Section 2: Cevap Süreci ---- */
function section2(b){
  const locked = !b.kayitTamam;
  const complete = b.tamamlandi;
  const open = openSections[2];
  return `
  <div class="section ${open?'open':''}">
    <div class="sec-head" onclick="${locked?'':'toggleSection(2)'}" style="${locked?'opacity:.5;cursor:default;':''}">
      <div class="idx" style="background:var(--amber)">${complete?'✓':'2'}</div>
      <div class="t">Cevap Süreci</div>
      <div class="stat">${locked?'Bekliyor':(complete ? fmtDate(b.tamamlandiTarih) : 'Devam ediyor')}</div>
      <div class="chev">▾</div>
    </div>
    ${locked ? '' : `<div class="sec-body">${complete ? section2Summary(b) : section2Fields(b)}</div>`}
  </div>`;
}
function section2Summary(b){
  let html = `<div class="readrow"><span class="k">Cevap Niteliği</span><span class="v">${b.cevapNiteligi==='olumlu'?'Olumlu':'Olumsuz'}</span></div>`;
  if(gerekYaziliCevap(b)){
    html += `<div class="readrow"><span class="k">Yazılı Cevap</span><span class="v">Verildi — ${fmtDate(b.yaziliCevapTarih)}</span></div>`;
  }else{
    html += `<div class="readrow"><span class="k">Bildirim Şekli</span><span class="v">${b.bildirimSekli==='telefon'?'Telefonla':'Yüz Yüze'} bilgi verildi</span></div>`;
    html += `<div class="readrow"><span class="k">Bildirim Tarihi</span><span class="v">${fmtDate(b.bildirimTarih)}</span></div>`;
  }
  return html;
}
function section2Fields(b){
  let html = `
    <div class="field"><label>Cevap Niteliği</label>
      <div class="choice-grp">
        <div class="choice ${b.cevapNiteligi==='olumlu'?'sel':''}" onclick="updateField('${b.id}','cevapNiteligi','olumlu')">Olumlu</div>
        <div class="choice ${b.cevapNiteligi==='olumsuz'?'sel neg':''}" onclick="updateField('${b.id}','cevapNiteligi','olumsuz')">Olumsuz</div>
      </div>
    </div>
  `;
  if(!b.cevapNiteligi){
    html += `<p class="help">Cevap niteliği seçildiğinde süreç devam eder.</p>`;
    return html;
  }
  if(gerekYaziliCevap(b)){
    // Bilgi Edinme (her zaman) ya da Dilekçe + olumsuz cevap: yazılı cevap zorunlu
    html += `
    <div class="field"><label>Yazılı Cevap</label>
      <div class="choice-grp">
        <div class="choice ${!b.yaziliCevapVerildi?'sel neg':''}" onclick="toggleYaziliCevap('${b.id}',false)">Yazılı Cevap Verilmedi</div>
        <div class="choice ${b.yaziliCevapVerildi?'sel':''}" onclick="toggleYaziliCevap('${b.id}',true)">Yazılı Cevap Verildi</div>
      </div>
      ${b.yaziliCevapVerildi ? `<p class="help">${fmtDate(b.yaziliCevapTarih)} tarihinde işaretlendi.</p>` : `<p class="help" style="color:var(--rust);">${b.turu==='Bilgi Edinme' ? 'Bilgi edinme başvuruları yalnızca yazılı cevapla kapatılabilir.' : 'Olumsuz cevaplarda süreç yazılı cevap verilmeden ilerlemez.'}</p>`}
    </div>
    <button class="primary-btn" ${b.yaziliCevapVerildi?'':'disabled'} onclick="finishSurec('${b.id}')">Süreci Tamamla</button>
    `;
  }else{
    // Dilekçe + olumlu cevap: telefon/yüz yüze bilgi vererek kapatılabilir
    html += `
    <div class="field"><label>Bildirim Şekli</label>
      <div class="choice-grp">
        <div class="choice ${b.bildirimSekli==='telefon'?'sel':''}" onclick="updateField('${b.id}','bildirimSekli','telefon')">Telefonla</div>
        <div class="choice ${b.bildirimSekli==='yuzyuze'?'sel':''}" onclick="updateField('${b.id}','bildirimSekli','yuzyuze')">Yüz Yüze</div>
      </div>
      <p class="help">Olumlu cevaplarda telefon/yüz yüze bilgi verilmesi yeterlidir, yazılı cevap zorunlu değildir.</p>
    </div>
    <button class="primary-btn" ${b.bildirimSekli?'':'disabled'} onclick="finishSurec('${b.id}')">Bilgi Verildi — Süreci Tamamla</button>
    `;
  }
  return html;
}

/* ================= LIST / REPORT ================= */
function render(){
  renderReportShell(true);
}

function renderReportShell(fullRebuild){
  const el = document.getElementById('reportView');
  if(fullRebuild || !document.getElementById('rep-table')){
    el.innerHTML = `
      <div class="report-filters">
        <input type="text" id="rep-search" value="${esc(reportFilters.search)}" placeholder="Ad soyad, TC no, abone no veya konu ara" oninput="updateReportFilter('search',this.value)">
        <select id="rep-turu" onchange="updateReportFilter('turu',this.value)">
          <option value="all">Tüm Türler</option>
          <option value="Dilekçe">Dilekçe</option>
          <option value="Bilgi Edinme">Bilgi Edinme</option>
        </select>
        <select id="rep-durum" onchange="updateReportFilter('durum',this.value)">
          <option value="all">Tüm Durumlar</option>
          <option value="1">Kayıt</option>
          <option value="2">Cevap Süreci</option>
          <option value="3">Tamamlandı</option>
        </select>
        <div class="urgent-toggle ${reportFilters.onlyUrgent?'on':''}" onclick="toggleUrgentFilter()">⚠ Sadece Acil</div>
        <input type="date" id="rep-from" value="${esc(reportFilters.from)}" onchange="updateReportFilter('from',this.value)" title="Başlangıç tarihi">
        <input type="date" id="rep-to" value="${esc(reportFilters.to)}" onchange="updateReportFilter('to',this.value)" title="Bitiş tarihi">
      </div>
      <div id="rep-count" class="rep-count"></div>
      <div id="rep-table"></div>
    `;
    document.getElementById('rep-turu').value = reportFilters.turu;
    document.getElementById('rep-durum').value = reportFilters.durum;
  }
  renderReportTable();
}
function toggleUrgentFilter(){
  reportFilters.onlyUrgent = !reportFilters.onlyUrgent;
  renderReportShell(true);
}
function updateReportFilter(key, val){
  reportFilters[key] = val;
  renderReportTable();
}
function renderReportTable(){
  const tbl = document.getElementById('rep-table');
  if(!tbl) return;
  let rows = DATA.slice();
  if(reportFilters.search){
    const q = reportFilters.search.toLocaleLowerCase('tr');
    rows = rows.filter(b =>
      (b.adSoyad||'').toLocaleLowerCase('tr').includes(q) ||
      (b.tcKimlik||'').includes(q) ||
      (b.aboneNo||'').toLocaleLowerCase('tr').includes(q) ||
      (b.konu||'').toLocaleLowerCase('tr').includes(q)
    );
  }
  if(reportFilters.turu !== 'all') rows = rows.filter(b => b.turu === reportFilters.turu);
  if(reportFilters.durum !== 'all') rows = rows.filter(b => currentStage(b) === Number(reportFilters.durum));
  if(reportFilters.onlyUrgent) rows = rows.filter(b => isUrgent(b));
  if(reportFilters.from){
    const fromTs = new Date(reportFilters.from).getTime();
    rows = rows.filter(b => b.createdAt >= fromTs);
  }
  if(reportFilters.to){
    const toTs = new Date(reportFilters.to).getTime() + GUN_MS - 1;
    rows = rows.filter(b => b.createdAt <= toTs);
  }
  rows.sort((a,b)=> b.createdAt - a.createdAt);

  document.getElementById('rep-count').textContent = `${rows.length} kayıt listeleniyor`;

  if(rows.length === 0){
    tbl.innerHTML = `<div class="empty-col">Filtreyle eşleşen kayıt bulunamadı</div>`;
    return;
  }
  tbl.innerHTML = `
    <table class="rep-tbl">
      <thead><tr>
        <th>TC No</th><th>Ad Soyad</th><th>Abone No</th><th>Konu</th><th>Tür</th><th>Kayıt Tarihi</th><th>Geçen Gün</th><th>Durum</th>
      </tr></thead>
      <tbody>
        ${rows.map(b=>{
          const stage = currentStage(b);
          const urgent = isUrgent(b);
          const color = stageColor(stage);
          const rowClass = b.tamamlandi ? 'row-done' : (urgent ? 'row-urgent' : (stage===1 ? 'row-kayit' : 'row-progress'));
          const gun = gunGecti(b);
          return `<tr class="${rowClass}" onclick="openModal('${b.id}')">
            <td class="mono" data-label="TC No">${b.tcKimlik ? '***'+esc(b.tcKimlik.slice(-4)) : '—'}</td>
            <td data-label="Ad Soyad">${esc(b.adSoyad)||'—'}</td>
            <td class="mono" data-label="Abone No">${esc(b.aboneNo)||'—'}</td>
            <td data-label="Konu"><span class="konu-cell">${esc(b.konu)||'—'}</span></td>
            <td data-label="Tür">${esc(b.turu)||'—'}</td>
            <td data-label="Kayıt Tarihi">${fmtDateShort(b.createdAt)}</td>
            <td data-label="Geçen Gün">${gun} gün</td>
            <td data-label="Durum"><span class="badge" style="background:var(--${color}-soft);color:var(--${color})">${stageLabel(stage)}</span>${urgent?'<span class="urgent-tag">ACİL</span>':''}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

/* ================= INIT ================= */
function init(){
  kayitlarRef.onSnapshot(snapshot=>{
    snapshot.docChanges().forEach(change=>{
      const data = change.doc.data();
      const idx = DATA.findIndex(x=>x.id===data.id);
      if(change.type === 'removed'){
        if(idx>=0) DATA.splice(idx,1);
      }else if(idx>=0){
        DATA[idx] = data;
      }else{
        DATA.push(data);
      }
    });
    render();
    if(openId && DATA.find(x=>x.id===openId)){
      const activeEl = document.activeElement;
      const isTyping = activeEl && document.getElementById('modal').contains(activeEl) && (activeEl.tagName==='INPUT' || activeEl.tagName==='TEXTAREA');
      if(!isTyping) renderModal();
    }
  }, err=>{ console.error('Firestore dinleme hatası', err); });

  // her gece yarısı "geçen gün" ve acil durum göstergelerini tazelemek için
  setInterval(()=>{ render(); if(openId) renderModal(); }, 60*60*1000);
}
init();

/* ================= PWA: SERVICE WORKER ================= */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./service-worker.js')
      .catch(err=>console.error('Service worker kayıt hatası', err));
  });
}
</script>
